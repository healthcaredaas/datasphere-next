# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/datasphere?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # 生产环境缓存开启
  thymeleaf:
    cache: true

# 生产环境日志
logging:
  level:
    root: WARN
    cn.healthcaredaas.datasphere: INFO
    com.baomidou.mybatisplus: WARN
  file:
    name: /var/log/datasphere/datasphere-quality.log
    max-size: 500MB
    max-history: 30
    total-size-cap: 10GB
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{50} - %msg%n"

# 生产环境Nacos
nacos:
  discovery:
    server-addr: ${NACOS_SERVER}
    namespace: ${NACOS_NAMESPACE:prod}
  config:
    server-addr: ${NACOS_SERVER}
    namespace: ${NACOS_NAMESPACE:prod}

# 生产环境Swagger关闭
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 生产环境质量配置
datasphere:
  quality:
    batch-size: 5000
    max-error-records: 50000
