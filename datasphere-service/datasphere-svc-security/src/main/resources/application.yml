# DataSphere Security Service - 数据安全服务

server:
  port: 8088

spring:
  application:
    name: datasphere-svc-security
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/datasphere?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    hikari:
      pool-name: SecurityHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      connection-test-query: SELECT 1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleteFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'
  mapper-locations: classpath*:mapper/**/*.xml

# 日志配置
logging:
  level:
    root: INFO
    cn.healthcaredaas.datasphere.svc.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# 数据安全服务配置
datasphere:
  security:
    # 访问日志保留天数
    access-log-retention-days: 180
    # 敏感字段识别采样率
    sensitive-detection-sample-rate: 0.1
    # 默认脱敏算法
    default-mask-algorithm: MASK_PARTIAL
    # 审计日志异步处理
    audit-log-async: true
