server:
  port: 8089

# 应用信息
spring:
  application:
    name: datasphere-svc-agent
    version: @project.version@

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/datasphere?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    hikari:
      pool-name: AgentHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      connection-test-query: SELECT 1

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      write-null-map-values: false
    deserialization:
      fail-on-unknown-properties: false

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# Nacos配置
spring.cloud:
  nacos:
    discovery:
      server-addr: ${NACOS_SERVER:localhost:8848}
      namespace: ${NACOS_NAMESPACE:}
      group: DEFAULT_GROUP
    config:
      server-addr: ${NACOS_SERVER:localhost:8848}
      namespace: ${NACOS_NAMESPACE:}
      group: DEFAULT_GROUP
      file-extension: yaml
      enabled: false

# 日志配置
logging:
  level:
    root: INFO
    cn.healthcaredaas.datasphere.svc.agent: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    enableSwaggerModels: true
    enableDocumentManage: true

# DataSphere AI Agent配置
agent:
  # 默认模型
  default-model: CLAUDE
  # 最大历史消息数
  max-history-messages: 20
  # 最大工具调用迭代次数
  max-tool-iterations: 5
  # 流式响应超时时间(秒)
  stream-timeout: 60
  # 工具执行超时时间(秒)
  tool-timeout: 30
  # 启用审计日志
  enable-audit-log: true
  # 启用Token统计
  enable-token-stats: true
  # 加密密钥(用于API密钥加密)
  encryption:
    key: ${AGENT_ENCRYPTION_KEY:DataSphere2026SecretKeyForAgent}

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: nacos://${NACOS_SERVER:localhost:8848}
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      group: DEFAULT_GROUP
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: cn.healthcaredaas.datasphere.svc.agent.rpc
  consumer:
    timeout: 30000
    retries: 0
    check: false
  provider:
    timeout: 30000