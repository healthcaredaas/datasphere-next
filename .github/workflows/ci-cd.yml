name: DataSphere CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: datasphere_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean compile -DskipTests

    - name: Run Unit Tests
      run: mvn test -Dspring.profiles.active=test
      env:
        MYSQL_HOST: localhost
        MYSQL_PORT: 3306
        MYSQL_USERNAME: root
        MYSQL_PASSWORD: root123

    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit

    - name: Code Coverage
      run: mvn jacoco:report

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: '**/target/site/jacoco/jacoco.xml'
        flags: unittests
        name: codecov-umbrella

  integration-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Start Infrastructure
      run: docker-compose -f docker-compose.yml up -d mysql redis nacos

    - name: Wait for Services
      run: sleep 60

    - name: Run Integration Tests
      run: mvn verify -P integration-test -DskipUnitTests

    - name: Stop Infrastructure
      run: docker-compose -f docker-compose.yml down

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  docker-build:
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-datasource:latest ./datasphere-service/datasphere-svc-datasource
        docker build -t ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-quality:latest ./datasphere-service/datasphere-svc-quality
        docker build -t ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-asset:latest ./datasphere-service/datasphere-svc-asset
        docker build -t ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-security:latest ./datasphere-service/datasphere-svc-security

        docker push ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-datasource:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-quality:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-asset:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/datasphere-svc-security:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment..."
        # 这里可以添加实际的部署脚本
        # 例如：kubectl apply -f k8s/
